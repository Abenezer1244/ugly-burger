<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ugly Burger — So ugly. So good.</title>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FastFoodRestaurant",
  "name": "Ugly Burger",
  "description": "Small-menu smashburger spot in Shoreline, WA. Quarter-pound fresh beef on potato buns with Ugly Sauce.",
  "url": "https://uglyburger.com",
  "telephone": "+12065551234",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "19939 Ballinger Way NE B",
    "addressLocality": "Shoreline",
    "addressRegion": "WA",
    "postalCode": "98155",
    "addressCountry": "US"
  },
  "geo": {
    "@type": "GeoCoordinates",
    "latitude": 47.7559,
    "longitude": -122.3310
  },
  "servesCuisine": ["American", "Burgers"],
  "priceRange": "$$",
  "openingHoursSpecification": [
    {
      "@type": "OpeningHoursSpecification",
      "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
      "opens": "11:00",
      "closes": "21:00"
    }
  ],
  "aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "4.8",
    "reviewCount": "143"
  }
}
</script>
<!-- TODO: Set ordering platform URL. Search for "Order online" in site.jsx and update href/onClick. Providers: DoorDash, Square Online, Toast, Slice. -->
<link rel="stylesheet" href="verge.css" />
<link rel="stylesheet" href="styles.css" />
<style>
  /* Page-level scrollbar styling */
  html { scroll-behavior: smooth; }
  body { margin: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="burger.jsx"></script>
<script type="text/babel" src="site.jsx"></script>

<script type="text/babel">
const { useState } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "diner",
  "accent": "#d4321a",
  "bg": "#f3ead4",
  "headline": "So ugly. So good.",
  "showLabels": true,
  "intensity": 1.0,
  "scrollMult": 1.0
}/*EDITMODE-END*/;

const ACCENTS = [
  { id: "ketchup", label: "Ketchup", color: "#d4321a" },
  { id: "mustard", label: "Mustard", color: "#f5b840" },
  { id: "mint", label: "Mint", color: "#3cffd0" },
  { id: "uv", label: "Ultraviolet", color: "#5200ff" },
];

const BACKGROUNDS = [
  { id: "diner", label: "Diner cream", theme: "diner", bg: "#f3ead4" },
  { id: "verge", label: "Verge black", theme: "verge", bg: "#131313" },
  { id: "checker", label: "Paper white", theme: "checker", bg: "#fffdf6" },
];

const App = () => {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

  const bgPreset = BACKGROUNDS.find(b => b.bg === tweaks.bg) || BACKGROUNDS[0];

  return (
    <>
      <window.UglySite
        theme={bgPreset.theme}
        accentOverride={tweaks.accent}
        bgOverride={tweaks.bg}
        headline={tweaks.headline}
        showLabels={tweaks.showLabels}
        intensity={tweaks.intensity}
        scrollMult={tweaks.scrollMult}
      />

      <window.TweaksPanel title="Tweaks">
        <window.TweakSection title="Headline">
          <window.TweakText
            label="Hero text"
            value={tweaks.headline}
            onChange={v => setTweak("headline", v)}
          />
        </window.TweakSection>

        <window.TweakSection title="Accent color">
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {ACCENTS.map(a => (
              <button
                key={a.id}
                onClick={() => setTweak("accent", a.color)}
                style={{
                  width: 36, height: 36, borderRadius: 999,
                  background: a.color,
                  border: tweaks.accent === a.color ? "2px solid #fff" : "2px solid transparent",
                  outline: tweaks.accent === a.color ? "1px solid #000" : "none",
                  cursor: "pointer",
                }}
                title={a.label}
              />
            ))}
          </div>
        </window.TweakSection>

        <window.TweakSection title="Background">
          <window.TweakRadio
            value={tweaks.bg}
            onChange={v => setTweak("bg", v)}
            options={BACKGROUNDS.map(b => ({ value: b.bg, label: b.label }))}
          />
        </window.TweakSection>

        <window.TweakSection title="Explosion">
          <window.TweakSlider
            label="Intensity"
            min={0.2} max={1.6} step={0.1}
            value={tweaks.intensity}
            onChange={v => setTweak("intensity", v)}
          />
          <window.TweakSlider
            label="Scroll speed"
            min={0.5} max={2.0} step={0.1}
            value={tweaks.scrollMult}
            onChange={v => setTweak("scrollMult", v)}
          />
          <window.TweakToggle
            label="Show ingredient labels"
            checked={tweaks.showLabels}
            onChange={v => setTweak("showLabels", v)}
          />
        </window.TweakSection>
      </window.TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
